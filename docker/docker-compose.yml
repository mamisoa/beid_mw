services:
  beid-mw:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: beid-mw
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ..:/app # Mount the entire application directory
      - /dev/bus/usb:/dev/bus/usb # USB devices
      - /run/pcscd:/run/pcscd # Host pcscd socket
      # Mount host libpcsclite to match pcscd protocol version
      - /usr/lib/x86_64-linux-gnu/libpcsclite.so.1:/lib/x86_64-linux-gnu/libpcsclite.so.1.0.0:ro
      - /usr/lib/x86_64-linux-gnu/libpcsclite_real.so.1:/lib/x86_64-linux-gnu/libpcsclite_real.so.1:ro
    devices:
      - /dev/bus/usb:/dev/bus/usb
    privileged: true
    environment:
      - PYKCS11LIB=/usr/lib/x86_64-linux-gnu/libbeidpkcs11.so.0
      - PYTHONPATH=/app
